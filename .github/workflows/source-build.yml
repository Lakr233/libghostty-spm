name: Source Build

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/source-build.yml
      - Ghostty.ref
      - Patches/**
      - Script/build-ghostty.sh
      - Script/support/**

permissions:
  contents: read

concurrency:
  group: source-build-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: macos-15
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-macos
          - target: x86_64-macos
          - target: aarch64-ios
          - target: aarch64-ios-simulator
            cpu: apple_a17
          - target: x86_64-ios-simulator
          - target: aarch64-ios-macabi
            cpu: apple_a17
          - target: x86_64-ios-macabi
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Clone Ghostty
        run: |
          git clone https://github.com/ghostty-org/ghostty ./References/ghostty-upstream
          git -C ./References/ghostty-upstream checkout "$(tr -d '[:space:]' < Ghostty.ref)"

      - name: Build
        run: |
          export ZIG_CPU="${{ matrix.cpu }}"
          ./Script/build-ghostty.sh \
            "$PWD/References/ghostty-upstream" \
            "${{ matrix.target }}" \
            "$RUNNER_TEMP/libghostty"
